body:
  text: 序品第一如是我聞一時佛在大靈鷲山與大比丘八萬人俱尊者尊者舍利弗尊者摩訶目連尊者摩訶迦葉而為上首與菩薩衆八萬人俱觀世音菩薩阿逸陀菩薩行願普賢菩薩文殊師利菩薩而為上首諸大梵王釋提桓因毗沙門王大持國王無量天衆俱海龍王夜叉王阿修羅王無量神衆俱阿闍世王波斯耨王宰官波羅門無量人衆俱達多地獄焰口餓鬼金色師子六牙象王無量非人俱各禮佛足退坐一面爾時世尊從多寶佛入塔下大衆圍繞飛行東方百千里程有一國土名大七寶震旦其國中央有一高山名五寶臺文殊師利常在説法至於此山告大衆言昔於此國觀世音菩薩化作三禪初梵王化人間故沒梵宮殿下生王宮大德龍身説示天理五行氣變作吉凶法地沒還天作春天主觀世音菩薩化作初禪二大梵王化人間故沒天宮殿下生王宮火德牛頭説示地利百藥醫毒助人間氣地沒還天作夏天主觀世音菩薩化作帝釋化人間故沒天宮下生王宮土德人質説示人倫心法大道身法五倫地沒還天作土用主是三王者成強三才説人性德依俗説法示第一義皆是觀音大悲應化故此國觀音有緣末法世中我法流布餘佛緣滅唯存觀音化益永世説是語已三王出現頂禮佛足而白佛言世尊如今佛説如是爾時世尊從座而起為三王及大衆等亦行東方萬里海上海中有國名大日發東西南北海中有國是眷屬國世尊至於此國海邊告大衆言往昔劫初觀世音菩薩化作色界第十梵王告初梵王汝下空中欲界天界及下造地造觀世音菩薩化初梵王奉其四禪大梵王敕王及妃供下下空中次第造天下造大地最後造斯國及眷屬海中國山河草木有一天女名妙辨財是亦觀世音菩薩無量劫來以女像作大福田來為王女即成日輪及月光輪主四天下眷屬無量住此國中或主或伴是故其國觀音有緣末法世中我法流布餘佛緣滅唯存觀音化益永世説是語已天女出現頂禮佛足而白佛言世尊如今佛説如是爾時世尊從座而起為天女及諸大衆等亦行東方於其海中有諸國土此國衆生質近畜生雖我正法漸漸流布難有悟入但作結緣為成佛緣爾時世尊為諸大衆還至本處靈鷲山頂敷座而坐告諸大衆我不久當般涅槃諸大衆意有欲問法自恣為問時諸大衆默然而坐一切無聲爾時世尊非現神而示妙相成就妙大方廣佛心真如蓮華成就五百劫前受用法身成就佛佛能盡究竟諸法實相成就華嚴阿含方等般若一實及多寶佛成法妙法蓮華證明真如大願成就過去無量劫前入滅不滅成就寶塔是法界塔常寂光土成就分座是即理智自他法身如是成就二躬世尊牟尼如來面座靈鷲華藏世界多寶如來已還寶成就寂光世界二土融通成就一土是即開見凡夫心中元有佛心凡夫成佛至大妙法是即欲以此妙法藏而付後師摩訶迦葉所由相也爾時世尊不起法華妙道法座拈華品第二爾時娑婆世界主大梵王名曰方廣以三千大千世界成就之根妙法蓮金光明大婆羅華捧之上佛退以作禮而白佛言世尊今佛已成正覺五十年來種種説法種種教示化度一切機類衆生若有未説最上大法為我及末世行菩薩人欲行佛道凡夫衆生布演宣説作是言已捨身成座莊嚴天衣令坐如來爾時如來坐此寶座受此蓮華無説無言但拈蓮華入大會中八萬四千人天時大衆皆止默然於時長老摩訶迦葉見佛拈華示衆佛事即今廓然破顏微笑佛即告言是也我有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳總持任持凡夫成佛第一義諦今方付屬摩訶迦葉言已默然爾時尊者摩訶迦葉即從座起頂禮佛足而白佛言世尊妙哉我念過去無量劫事於燃燈佛布説法處發菩提心從佛修行亦復世尊布説法於説法中得漏盡智成阿羅漢亦復聞説諸法實相入菩薩道不動先果成大乘道得近如來一切種智如是妙智從何處來皆從凡夫久遠心來其久遠心等諸佛心是為法身是名成佛得見是心非在言教理誨理解文字之中但在以心示中不假三昧不期感果因緣熟時凡夫即見是故佛道傳於凡夫人中不絶若無此法唯有感果賢聖得道而無凡夫比丘比丘尼優婆塞優婆夷得佛道者若然於末法濁惡世中證果人者千萬人中無有一人無證果故佛道絶傳唯有名字無有道象有此法故傳佛道象不結於末世佛言善哉摩訶迦葉如汝所言七佛世尊授法象然七佛弟子傳法象爾我滅度後以大法藏今付於汝能持傳傳弘通正法尋嗣心道令不斷絶爾時世尊從起梵王以身為座妙嚴天座著於本座告大梵王汝於過去無量中修菩薩道住高地位能問是法於末法濁惡世中相續諸佛大道心法令不斷絶咸是所以依汝力也尚有所以思悉恣問之如來為汝演説正法大梵王言善哉世尊聽問如是我當問之如來先經為未説之為未示之為既示之佛告大梵王言我先已説為既説之為舍利弗謂不可以言宣是也時舍利弗面會此法即得當成華光佛記亦復龍女以一寶珠無句上之龍女以一寶珠無句上之如來又也速受寶珠無句受之龍女又依此佛心道即得成佛亦復是也大梵王言若如是者今日如來以此一法為最真實佛言如是如汝所言舍利弗者過去劫來不離於我今日亦然我俱不久入於涅槃不留我後龍女已得他方成佛非我弟子其法不傳皆如無耳今日有獨摩訶迦葉傳真道象我滅度後至於末法五濁惡世後五百歲不絶佛道唯在迦葉獨付傳中是故名曰唯是真實大梵王言如來先説後五百歲其五百歲是何時也佛言夫其五百歲者我滅度後佛法住世正法八百年像法千二百末法五千五百年已去正法像法末法後所有年五百歲是也大梵王言正法像法末法及後五百歲者是謂何世何國然也佛言其世是人間世而非天世及龍世也亦復其國是閻浮中隨機諸國非必一國所以者何天世龍世是聖者世而無年限但有人世上清下濁上盛下衰是故有限亦復國國時改機變或有天護或有聖護或無天護或無聖護或有神護或有仙護或無神護或無仙護人機無量國隨人機是故非必一國然也梵王白言世尊如是如佛所説國機不同或有有緣或有無緣或有護安或有護難茲興彼廢茲廢彼興佛法東漸後五百歲留法不絶利益衆生爾時大梵天王白佛言世尊出世四十餘年種種説法云何有未曾有法耶云何有及言語法耶願為世間一切人天能示己自言了金色千葉大婆羅華持以上佛而退捨身以為床座真誠念願爾時世尊著坐其座廓然拈華時衆會中百萬人天及諸比丘悉皆默然時於會中唯有尊者摩訶迦葉即見其示破顏微笑從座而起合掌正立有氣無言爾時佛告摩訶迦葉言吾有正法眼藏涅槃妙心實相無相微妙法不立文字教外別傳有智無智得因緣證今日付屬摩訶迦葉摩訶迦葉未來世中奉事諸佛當得成佛今日亦堪為世間師佛告諸比丘如來今者不久滅度汝等比丘皆悉能依摩訶迦葉入大乘門修行佛道告摩訶迦葉無有餘法唯一心性佛過去諸佛現在諸佛未來諸佛已説今説當入而已一切諸佛依一心性已成説佛道現成佛道當成佛道一切衆生亦復如是若謂餘法尚有更一諸佛成佛衆生成佛即外道説非七佛説非十方佛説迦葉當知汝所付屬八萬藏經是諸教者是即乘一心器也譬如世間牛車馬車是為諸法乘之渡於道路器也所有教經亦復如是汝能奉持爾時摩訶迦葉歡喜踊躍為佛作禮而白佛言世尊此法實難遭者誠是直道誠是妙道我昔遇佛出家修行偏厭生死唯求涅槃但修無為不求是法但了空理不知是法難行苦行多年作勞得阿羅漢思之誠難今日如來最上妙示唯剎那事非年非劫非難妙易令我成佛無有疑惑雖非實至劫數成時三十二相八十種好紫磨金色妙覺成佛實知法身是心是佛三世諸佛一軀妙體今思已前於多年中難行苦行是勞無功亦多年中求空無為皆虗假法更非實法今日見得是真空法其相正空而性不空其體無為而性圓滿一切衆生唯依是法當得成佛佛告摩訶迦葉言如是如是如汝所説汝於未來當得成佛如我今日是法爾時世尊説此言已即從座起還坐本座無語無動衆會亦復寂莫無聲皆含妙氣爾時大梵天王白佛言世尊善哉世尊能快説之世尊滅度後世衆生云何入得云何修行願為我入入得修行精密法要佛告大梵天王天王諦聽善思念説之衆生機根種種無量或聽理入或禪定入或因緣入或持示入不一般也天王唯有信心能入是最上道云何起信不依心性他不成佛所以者何於心性外無成佛路如是了知真實求者能入是道智慧如舍利弗多聞如阿難陀辨才如布婁那解空如須菩提持戒如優婆利神通如目健連天眼如阿那律如是此輩皆不成佛所以者何此輩皆得心性假用未得心性真實體故唯證性體必滅佛道如是了知真實求者能入是道天王或有知見心性妙實體者知見之時即體妙理無放無離行住坐臥心身融一見聞覺知根性融一如是修行即行佛道在家菩薩出家菩薩非異非別唯以融一箇之道我於即時成佛道已世間出世修行無咎爾時大梵天王問迦葉言世尊往昔説種種教其教理之今日仁者從佛所受心云何有所差別語梵王言仁者莫問如是此事若有世尊已前所説教理差於今日所受心者彼諸教者即是邪説若有世尊今日所受心差於已前所説教理是此心者即是心一切教之此一心理無有毛端所差別所若有學人謂諸教理與此心理有所差別是即外道天魔所説非唯不知諸大乘經所説之理亦不知我受一心理若知心理應知教理一理無差但有所差諸教理者以雖有益非真今此知見教唯是實無二雖設有他教其益皆小分不謂他無益分性説一端如星光日為分光為星光不謂星無光小端如無益四諦十二緣五戒及十善念佛往淨土具戒及坐禪權大諸菩薩皆是彼端小此教如日光他教如星光衆星雖天不謂之白晝日光出現時夜明天成晝他教雖有世不謂佛法者衆生正諸佛穢土是淨土生死自涅槃三世永一世世法即佛法有為實無為如是知見教及其修行者謂之佛法有又謂我世有佛説是語時衆有百千人皆了無上道言教令悟心性理令成佛道傳心理者以心傳之得心性理令成佛道教者漸入心者頓入心者遲速不同理則一同譬如東國人指日輪謂此日輪從我東天往彼西天西國人亦指日輪謂此日輪從彼東天來我西天等雖異彼此往來之言不差謂日日輪之言與語日東西理者不差如來教示亦復如是教傳心傳示相不同於理一同白言世尊此見性道應唯比丘行此道哉亦諸在家可普行哉佛言天王心性之道出家在家天龍鬼神皆悉具足何可限之比丘耳唯有在家出家行相於相異非一其出家行父母已赦出父母家代父母事三世諸佛無主君故代事菩薩布佛形家如生身佛有佛舍利如在世佛出世俗故不禮國王不敬天仙不求財寶但持一鉢不畜衣服但持三衣安住深山樹下岩洞清意淨身身明了覺知自己本佛陀方佛身一躬法月輪品第三爾時世尊告迦葉言摩訶迦葉七佛所説無有異路諸佛成道無有異法唯以是一知見明見自己一心形相性理即成佛耳若有他法令成佛者即是天魔波旬邪法迦葉當知我座菩提樹下降魔成等正覺當於其時盡見心形盡見心理我見心體如月輪形諸佛出現即授印證令我成佛我者久遠無量劫中修行成故現不成佛雖未即成佛身已我今印證此人即見己身成本佛是知見佛我今授記此人來世是不久當成果滿佛如今會中摩訶迦葉雖已知見自法身了未滿六度劫數成故未得成佛妙覺法身雖然如是知見自性佛法身體十方諸佛一體一躬知成佛故得佛印證事於未來諸佛世尊當得成佛天王譬如世間月輪朔弦望晦月不現雖是月輪人不言月朔月一分以日近故諸人不見雖俗不信知者知月如初發心見性道人世俗不知道人知之三日夕天現三分光雖未成輪世間知月如見性人能徹顯德諸人知之摩訶迦葉亦復如是雖今日未實成阿耨多羅三藐三菩提已受未來當成佛記別名見性佛云何道人心圓月輪有十五分布施度者大慈悲用轉慳貪心饒益自德利澤衆生戒律度者法儀性用轉邪惡心堅固自己保持衆生堪忍度者大誠信心用轉瞋恚心守護自道安穩衆生精進度者道理性用轉懈怠心勤修自己勸進衆靜慮度者大智慧用轄生放逸心接取自己接取衆生智慧度者智藝性功轉愚癡心明徹自己明徹衆生方便度者仁者智性功轉礙礙心易修自道易修自道衆生誓願度者仁勇性功轉發失心成就自道成就衆生任力度者智勇性功轉怯弱心任住自己任住衆生知智度者大覺性功轉迷惑心悟了自己悟了衆生所作智者應化覺德轉前五識成佛自己成佛衆生妙觀智者他受覺德轉第六識成佛自己成佛衆生平等智者自受覺德轉我人識成佛自己成佛衆生大圓智者自性覺德轉含藏識成佛自己成佛衆生法界智者法身覺德轉無明識成佛自己成佛衆生覺轉無明成法界性是名如來法界體智是十五道元來性具是名心性是名佛性十五圓滿不一可決無首無尾如環無端但以方便説示始終凡夫性者雖有不現猶如晦月有輪無覺初發心者始見性體猶如朔月現一分光作修行人智妄供有猶如弦月半白半黑聖者性者智見修滿猶如望月圓輪滿光即説偈曰凡夫未知見暗如晦月輪地前諸菩薩光如朔月等地中大菩薩明如弦月成地上覺菩薩圓如望月滿是此月輪者是久遠成佛名無量壽命決定王如來亦名法界宮常寂光淨土毗盧遮那佛常住此月輪十方諸如來俱住於此殿非因亦非果三世常住者凡夫行人者應觀如是理端坐觀月輪我身成本來毗盧遮那佛法身遍法界頂有五佛冠坐千葉蓮華身著瓔珞衣身色紫磨金百福本具足萬善莊嚴身一念間知見心性形月輪一念間憶念我身毗盧理是人名真實修念佛行者為得大功德東方阿閦佛南方寶生佛西方阿彌陀北方不空成如是等無量恆河沙諸佛稱常念名號恭敬禮供養經於百千歲是諸功德者知見之功德能作比量者是諸功德者不及於見性須臾之功德百分亦千分百千萬億分不及於一分何況常住體自性之本佛應用中於法世間與出世一面而度世自度亦化他天王出家菩薩者爾時世尊説是偈已告大衆言已前多説空法衆義是為能破數多煩惱成清淨心已成清淨同佛空心是名成佛是斯初位今説心月十五妙道入最上道是未成佛時能至佛佛位是斯終位十五修行是名諸位因佛修行十五成就是名諸佛果成佛道一切衆生身行相應是十五道口意亦爾一切行行無惡但善一切時時無迷但覺如是行人一生即得成聖人身人天恭敬龍鬼供養十方遊行無有障礙無有怨敵一切安樂一切無為法界品第四爾時大梵天王白佛言世尊我見法界諸佛無量衆生無量萬善無量萬惡無量以何法為成是等本佛告大梵王言善哉善哉天王問之有七法界成就是等一者三法身法界二者五緣因法界三者四氣法界四者七大法界五者三世間法界六者四順逆法界七者十界法界是法界集會成就一切世間天王諦聽云何三法身法界一者等流二者智行三者成佛云何五因緣一者法性二者無明三者逢著四者執行五者後會云何四氣法界一者空氣二者陽氣三者陰氣四者生氣云何七大法界一者地大二者水大三者火大四者風大五者空大六者識大七者根大云何三世間法界一者器界二者衆生三者五蘊云何四順逆法界一者五德二者十善三者四諦四者六度云何十界法界一者地獄二者非情三者鬼界四者畜生五者人間六者仙天七者二乘八者空界九者菩薩十者佛界云何等流法身法界普賢菩薩法身法界其法界理出生衆生無始無終非迷非覺是名等流法身法界云何智行法身法界觀音菩薩智慧法界其法界理命具衆生無始無終迷變覺成是名智行法身法界云何成佛法身法界毗盧遮那大薄伽梵大覺法界其法界理自然具足一切衆生無始無終轉迷開覺是名成佛法身法界云何法性因緣法界普賢法性等流之因自爾緣於觀音法性智行之緣觀音法性智行之因法然緣於毗盧遮那法性之果是為衆生因緣根之是妙法性因緣法界云何無明因緣法界一切衆生一心之元是法性理於其法性妙真理中依衆生緣忽然出生一念忘心是為衆生流轉之元是名無明因緣法界云何逢著因緣法界一切衆生同法性生法入同故自然相逢而作逢著結生死緣生生世世如是結緣是性為衆生流轉生死是名逢著法界云何執行因緣法界一切衆生相逢著故於著法中或生慈愛或生瞋恨或作善業或作惡業是名為衆生生死業因是名執行因緣法界云何後會因緣法界一切衆生此生結緣依此緣故必得後生亦會造業是為衆生生死永劫是名後會因緣法界云何空氣成世法界無始無終大空之中無始無終有一妙氣是如來藏含諸妙理能為成就世間之元是名空氣成世法界云何陽氣成世法界空氣變作主生動法一水北方三木東方五土中央七火南方九金西方如是數行成就世間是名陽氣成世法界云何陰氣成世法界陽氣變化主死寂法二火南方四金西方六水北方八木東方十土中央如是數行成就世間是名陰氣成世法界云何生氣父氣一月父母氣成衆生身分父氣一月成生腎母氣於時成生膀命母氣二月能成心絡父氣於時能成小膻父氣三月能成肝口母氣於時能成膽腦母氣四月能成肝口父氣於時能成胃三父氣五月成就肺口母氣於時成就大膜父氣六月成骨耳母氣七月盛血父舌父氣八月成眼母筋母氣九月成肉唇父氣十月成皮母鼻雖成同時熟有不同是名生氣成世法界云何地大堅質法界衆生支大骨肉質體皆是地大是名身分地大法界云何水大濕質法界衆生支體血液溫體皆是水大是名身分水大法界云何火大溫氣法界衆生支體君相溫氣皆是火大是名身分火大法界云何風大動搖法界衆生支體隨念動搖皆是風大是名身分風大法界云何空大法界一切衆生臟腑之間氣血通經皆是空大是名身分空大法界云何識大魂魄法界衆生心身眼耳鼻舌身意中有為其處主知了靈識皆是識大是名身心識大法界云何根大明徹法界衆生身心眼耳鼻舌身意根處皆根大是名身心根大法界云何器界世間法界一切衆生所住之所天地境界是名器界世間法界云何衆生世間法界有情非情迷覺衆類是名衆生世間法界云何五蘊世間法界一切衆生身者是色心者是受想行識也是名五蘊世間法界云何五德順逆法界其順五者一者孝父二者孝母三者忠君師四者助聖者五者歸三寶其五逆者一者殺父二者殺母三者弒君師四者殺聖者五者破三寶是名五德順逆法界云何十善順逆法界其順十者一者放生二者正施三者節貞四者誠語五者正語六者譽語七者睦語八者義捨九者和慈十者明慧其逆十者一者殺生二者偷盜三者邪淫四者妄語五者綺語六者惡口七者兩舌八者貪欲九者瞋恚十者愚癡是名十善順逆法界云何地獄受苦法界此大地下金輪際中有惡鬼集在其世界生諸衆生者為大鬼所割食噉食亦生亦然金輪際下有水氷輪水輪際下有火炎輪其水輪際其火輪際中諸衆生為氷所凍為火所燒晝夜無間受大毒苦是名地獄受苦法界云何非情愚毒法法界愚癡無智塞心塞念諸衆類或為土石或為生草木是名非情極愚法界云何諸鬼餓鬼貪鬼疫鬼毒鬼夜叉羅剎毗遮俱槃多等衆類是名鬼界苦毒法界云何畜生龍等諸鱗金翅鳥等一切諸羽龜螺等甲獅子虎狼等之諸毛猩猩等之一切裸蟲是名畜生非正法界云何人間正善法界剎利婆羅毗舍須陀五戒力及十善力生得善界是名人間正善法界云何天上善樂法界大十善力及八禪力生欲界天及色界天是名天上善樂法界云何七大一地土色身大二水汁血精大三火氣靈溫大四風木動息大五空金虗氣大是五大分迷覺二道二道各分依正二報迷道依報成天地世界迷道正報成人天有情覺道依報十方淨土覺道正報成諸佛菩薩六六識大風木大靈成眼識水汁大靈成耳識空金大靈成鼻識地土大靈成身識火大一身之主故分二識從靈成舌識主靈成意識七六根大風木大氣成眼根水大氣成耳根空金大氣成鼻根地土大氣成身根火大一身主也故分二根從氣成舌根主氣成意根云何如來藏地土識根大無量壽命決定王佛法身等流成水識根大不空成就佛法身等流成火識根大寶生佛法身等流成風木識根大無動佛法身等流成空金識根大無量壽佛法身等流成無始無終無造無為是名如來藏云何七大成佛佛言娑婆世界中有千百億天地其中有無量世界其中有無數衆生有智畜生行五戒道死而生於人間界不受自行而成庶人受持修行而成大人有智人間行十善道死後必生成人間王受自行成小國王受持不修行成大國王是名菩薩初行道者十信菩薩成鐵輪王十住菩薩成銅輪王十行菩薩成銀輪王十向菩薩成金輪王初地菩薩成四天王二地菩薩成忉利王三地菩薩成夜摩王四地菩薩成兜率王五地菩薩成化樂王六地菩薩成自在王七地菩薩成初禪王八地菩薩成二禪王九地菩薩成三禪王十地菩薩成四禪王等覺菩薩住於內院入中修盡無明下生人間而成正覺於內院是以最初修行故六大品第五爾時舍利弗即從座起合掌向佛而作是言世尊我依如來神力得大智慧普知世間及出世間一切諸法上世之時有轉輪王布於世間治世正法而説衆生身心即是木火土金水成也如來所説異之而説空風火水地所成也何為是乎佛告舍利弗汝善如來問之如是彼上世時轉輪聖王依大梵天大聖王説唯説天地成後之法七佛所説見其未成天地時事而説此法未生衆生前成大地未成大地前成諸天未成欲天前成陰陽未成陰陽有大氣大氣者是大空之有空無始無終茲有大法亦此大法無始無終與空同元當知此法是即正理猶為空主是名法性名如來藏依此法故大空有氣依此大氣能作陰陽依此陰陽作上天依上天故亦作大地成大地故生諸衆生衆生亦依彼法成覺成大覺者即名諸佛是故七佛説六大法所謂空風火水地識是空者是即氣興一也是名金行成肺主屬風者氣動是名木行成肝主屬地者土成名土行成脾主屬火者火行成心主屬水者水行成腎主屬何故不謂金謂空大謂金行則唯限實體不通空處謂空則通空兼實故何故不謂木謂風大謂木行則唯限體支不通用動謂風則通用兼體故何故不謂上謂地大地者土成成以成大依大成故何故不謂五形而謂為六大也謂五行則成天地後唯當人間不當未成謂六大者天地前後皆攝謂之何以故聖者轉輪大王唯謂天地不謂天外轉輪聖王唯治人倫不治外故諸佛如來知十界人業因報果此業力成天地衆生乃至成佛謂始中終故不同説白佛言世尊如佛所説轉輪聖王誤惑言耶佛言不爾轉輪聖王依梵天説但治世間上者登天中者化仙下者治人不説出世是故不説天地外法三世諸佛導世出世上者成佛次成菩薩次成緣覺次成聲聞能出世間能成聖位中者登天次登神仙次治人聞能治世間能成王法下者脫於諸畜生界次脫餓鬼次脫地獄能離苦界能生善道是故能説天前天後因果正法白佛言世尊大梵天王長壽久存七佛所説面正聞之云何不説七佛説也佛言善哉如汝所問雖然如是七佛所説久而斷滅不傳人間劫初輪王出世之時大梵天王雖知此法未成妙覺故不盡知其因果法能待後佛出世時説而不説也過去諸佛現在我佛未來一切佛時如是我法東漸東方諸國次第流布其諸國法亦復如是白佛言世尊云何説空佛言空主肺臟及主身分六腑六臟氣血通道九穴毛孔皆是空大白佛言世尊云何説風佛言風主肝臟及主心身支大動作皆是風大白佛言世尊云何説火佛言火主心臟及主身溫皆是火大白佛言世尊云何説水佛言水主腎臟主腎精心身支大血膩津液皆是水大白佛言世尊云何説地佛言地主脾臟及骨肉堅體皆是地大白佛言世尊六大法者持何道有又有修行哉佛言六大皆如來藏合於本元如來藏之正善覺聖是名修行是修行者皆成佛道背是修行恣妄亂行如是衆生皆隨生死生生世世流轉受苦無有盡期如車輪回識可悲愍白佛言世尊云何説識識主魂魄及主命門一切精氣皆是識大爾時舍利弗白佛言世尊有情氣盡已命終時地水火風空皆散盡有何身分向其中有亦向後生佛告舍利弗言如汝所問衆生身分依果報限以天命生受父母氣成身分故果報盡時天命限時至死期而地水火風空大散滅雖五大滅識大不滅何以故識者不依果報有故不命生故不氣受故無始無終如來藏故識以性理地水火風空大為身空體以冥質存俱依善惡業因成生今生業如其依業位捨此地水火風空大而亦受彼地水火風空大亦生生時以濕胎卵化生隨其界而受相應生隨其果報生六道中是名流轉三世諸位悲此境界出人間界廣説是理能令衆生歸於六大如來藏理日日六大時時六大不捨不忘如來藏理能合是理是名六大法身修行降魔品第六佛告阿難阿難當知此經誠實難信難行非謂此經不相應人無信無行此經最上成佛直路為最上者必有魔障以是理故難信難行何為魔事有四種魔大障弘通一者天魔作障魔二者外魔三者他魔外道邪見魔四者自魔有如是障誠是難行真是難治何為天魔依是經者無不成佛是故天魔常作障難雖至世間弘通之時橫遮不至其弘通時或雖世間有弘通人又令無伴侶者或令傍人為誹謗難或招災難令中生苦或託於人告此經非七佛説或以説弘於世間令謂此弘人行邪道人或付天子國王三公令欲不弘此經於國悲哉此經為魔被遮不廣於弘通流布我以佛眼見此難治唯不依經文字章句以此經理傳於心心廣令世間弘通流布又以方便令觀音等諸大菩薩能藏持之留此經卷同我護念不永斷絶阿難當知持傳此經是人即是大力菩薩真實行人何為外魔當有二種一者歸氣斷滅魔見二者成神鬼界魔見何為世學歸氣道人學世間教不知心造天地萬物善果惡果乃至十界解知天地五行萬物人間五蟲皆是氣造元氣分散心亦分散成虗無心無後果報因果撥無當墮惡趣悲哉此人不知教起此教法者高地菩薩作轉輪王出於世間先見時節為人間治設氣造教心造教者待起佛説雖此教宗不説無心無神無報後出外道以自凡心妄計妄解轉輪聖者所設聖教或失其傳私設無見斷見等旨妄立此宗此國他國乃至三千大千世界劫初所出諸聖王者皆是高地大菩薩也是故所説一切教示無有邪妄皆是正教以正以善能治國土依人民心此國他國今時後時諸外道者皆立私旨破我聖教豈唯破我所説説教還破上世聖王所設説示教宗如是長邪作妄解故此人時見我知見徒還作誹言不知真理妄迷顛倒作無益行大遮歸向我知見門一切人民無此經道何為世學成神道人但守一世不慮後世唯知人死成鬼成神不知出離生死成佛此教亦復聖王所設聖教旨也世下時遍遠聖者故妄作此解長記長才妄學旨者為修心身非為才記妄己不治唯破他教悲哉此人亦復不知此教本是聖王所設而不差於如來所説還見知見成佛道人誹謂不解天真本性道無成佛在法界宮亦無佛居十方淨土亦無作惡人居地獄皆是佛者以妄語成此知見人不知是理是甚愚人遮歸向人何為釋中典會魔當有四種一者文字博學見魔二等愚癡要約見魔三者易行著相見魔四者難行著相見魔何為文字博學見魔著文沙門於我所説諸大乘經盡藏盡部分別文句作解作傳講之釋之唯明文字章句義理稱我大智多聞強記一切經義通達無暗不知其經真實道理皆在己心諸經言者諸言者説己心理非文字義侈學侈才立我立慢還滅我教深入邪道成魔伴侶聞口説言即是佛語察意解理即是外魔悲哉此人不知諸佛出世説法教化本意若不開悟佛知見道不修行成修滅凡業修成聖業修滅凡氣修成聖氣而但應長多聞多才口給辨如來出世説法何益如是愚人還見真實不立文字知見心性作佛道人太作誹謗謂是魔徒大遮歸向於此經道一切行如是邪人識難治之三世諸佛一切人菩薩無有一佛亦一菩薩唯解文字唯持多聞不覺心性不修覺道已成佛道當成佛道如是愚人非我弟子是為魔徒何為要約愚癡見魔無智沙門於我所説諸教經中取一要文深著其理悉捨他教甚深法門非是真實非是要道擇是擇彼一切廢捨日日增信自執妄見時時增厭諸佛廣道強著強執次第入暗捨智捨覺終成極愚設諸佛現雖破此邪諸大菩薩雖破此愚不聞不入還作瞋邪亦作大謗道汝不知妄破我法時見此經知見道人謂是迷人不解要法妄作覺解諸佛如見是知見道廣博無益云何愚人應能解之設有能解示天何益但捨知見入惡道如是教化遮我大道悲哉此人不知諸佛修行成事一切諸菩薩者生生增智世世致理劫初益見代代格覺如是愚人諸佛誠度悲之阿難當知如是愚人設得六通現三昧相如是天魔化來所作勿生一念歸信之心如是愚人誠難治之三世諸佛一切菩薩無有一切亦一菩薩以一句義不通衆理持一要文不明性道捨智成愚一向無機已成佛道當成佛道如是愚人非我弟子即是魔徒何為易行著相見魔無力沙門於我所説諸教經中為化愚癡無根之人任於過去諸佛方便亦不得止設方便教或歸一佛的一菩薩或持一呪持一經句歸之信之不依難行滅罪解毒方便成路或有破戒劣根沙門倦修衆聖真人正道如渡得船見之歡喜悉捨諸佛戒慧道一向著住此方便道不知諸佛不得止設才時方便權假之道還以此權假方便為最上法謂無上路或作邪思為我能得一切道人未見未得最上妙法殊勝妙路招諸愚人為彼愚人設講設會廣説敷演而謂此道最勝極妙唯限此路衆生成佛諸餘經道皆是難行一切凡夫皆是下根若下根人依難行道百千萬人中雖一人實不可有得成佛道於茲一切魔魅得便加勢加利冥成助故日日長其信心氣亦日日弘長其邪法流亦復一切愚人迷俗於功茲得幸大作歸伏所以者何一切愚人好惡惡事懶於善行雖然如是一切賢聖一切諸佛已説今説作惡人者非是人間非是佛徒今過罪害後生惡趣生生世世得惡果報永絶成佛得脫大路是故捨好忍懶勤修依戒依定依慧修度忍難忍苦依聖學教恐罪捨惡趣向聖道然今逢此大易行説不依賢迹不依聖道永離惡趣直得成佛大慶大喜皆人此教於茲即廢諸佛正法豈唯廢我成佛法也即廢王法仁義聖道所以者何令諸人心深著易行不知道理以是理故親罪親過親迷親妄親惡親邪疏父疏母疏君疏臣疏聖疏賢疏天疏命豈唯是自然廢聖道也彼邪沙門見此經知見道人甚大惡之誹謗而謂此修行人不知直路遠迷久惑留難行道知見道者難解難入濁惡世中絶不相應下愚人民千萬億人於中無迷一成就此道誠可咍之此邪言流布於世大遮入於知見道人悲哉此人不知諸佛設方便旨諸佛設此方便路意欲先教之因是為緣起信近佛漸漸增益一切佛種引入佛道開示悟入佛知見道令得成佛阿難當知念三寶者是為至於知見寶處中路舟筏爾此愚人不知舟筏執此舟筏還遮寶處誠可悲之名非遮此佛知見道還遮自己念三寶道所以者何或是念佛或是念法或是念僧雖是皆實諸佛説法是愚沙門所念之心即邪念故念三寶法即成邪法修邪法故即墮魔道自墮魔道故令他墮魔自墮他墮皆破佛法破佛法故破念三寶豈唯墮魔邪類中也終墮無間大火坑中無量無邊大劫數間受無量苦永絶佛種如是愚人誠難治之三世諸佛一切菩薩無有一佛亦一菩薩不依此經佛知見道念一如來念一經句念一菩薩唯是一行已成佛道當成佛道如是愚人非我弟子即是魔徒白佛言世尊如是愚人云何得脫魔法魔徒應還信佛佛言阿難如是愚人即止慢心回心還思應當思念我是愚人我是惡人當墮三塗火坑之中但有諸佛以大慈悲能設方便為我等故説此易行念三寶道令我愚人永離三塗是尚慶餘應如是我往淨土者誠不思議我法方便更不應對他人勝道如是思念或念佛寶或法佛寶或念僧寶向其念寶一向專念無他思求依我劣根無由勝道唯歸如來方便之道於自他相無是無非不遮他道唯向自身拂心垢欲專念誦則衆魔退去其三寶現自無罪亦他無罪故即成我教念三寶法若一念生自勝他劣增上慢心還作魔行亦離佛行諸佛真實知見道尚謂自勝他劣等者即為魔道何以故此佛知見者為得作佛耳非為見自勝他劣生慢心故何況於為修佛方便劣行尚爾以自劣為勝於他勝道也何為難行著相見魔有沙門我法中為極惡人及極愚人亦極邪人亦諸闡提生盲生聾諸佛神力諸菩薩力一切不及以佛方便設一絶妙不思議術以神呪呪一切罪人令得解脫於此呪術法爾自然有十種功何為其十一者凡夫轉成聖仙二者罪惡轉成善德三者闡授轉成解脫四者流轉轉成往生五者魔障轉成賢業六者病惱轉成治安七者中夭轉成長壽八者天災轉成神福九者怨敵轉成恩伴十者兵亂轉成靜平其餘尚有無量神驗此呪術者難行苦行而面前現種種神驗或有邪念上根愚人或利欲者為世歸依或樂驗者為驗術故入於山林識濯木食種種難行得大神驗出於世間驚一切人即謂是法諸佛法中最上最勝化諸人民引入邪道不知如來方便所設唯樂一切奇怪妄事永沈邪見悉墮魔道終必當墮三塗火坑豈唯自成奇怪邪徒自失正道還令諸佛大聖道共成奇怪法無其正道誠可悲之阿難當知諸佛如來設此方便神驗法者第一為欲難救罪人能救令入解脫門也是故諸佛以初五功為真實設第二亦以慈悲心故於現世生欲天下平萬姓安故以後五功為次實設其餘有驗皆是呪力自然功驗自然此愚人著其神驗種種奇怪無益名譽忘失本意成佛實驗瀧水逆流山嶽移他呪縛鬼神呪水為湯是事何益但實得脫有道沙門令損國水之逆流令害人鬼呪之縛者是有益故即是佛事除如是術彼邪驗人時見此經知見道人還作誹為無功無德謂道人愚癡不知我有功德修無功能下劣淺道大遮諸佛真實正法如是愚人誠難治之三世諸佛一切菩薩無有一佛亦一菩薩不依知見成佛正道修無益驗已成佛道當成佛道如是愚人非我弟子即是魔徒何為知見差路障魔當有十類一者禪坐不得迷魔二者辨達不悟迷魔三者凡聖不別見魔四者慮難不發見魔五者慮易差路迷魔六者知見不修見魔七者能修不見迷魔八者見空不中迷魔九者見滅不實迷魔十者心教不同見魔如是等有無量魔見但以略示此十類魔學士觀察勿墮此中何為禪坐不得迷魔趣向知見一乘道人為工夫故修行禪定從朝至晚從夕至曉但空靜慮日久年久如是漸了見無物心寂然空無想無念見此空入為是佛性道我禪中得佛知見更無顧故不知諸佛知見道者心是聖是智是覺是理但空寂體是知一端又未真實如是久修習練定心得定中靜又以非真佛性故無起時靜故於定中心靜空淨起故定時心散生平有人道之定時起時心差別非於此又迷不知心散是依不得實知見故還唯心散是依修禪尚未練故益修空定隨修入空唯見絶空了不得實佛知見道學者須知勿入此魔若誤入者設經劫數不得知見魔恐此魔何為辨達不悟迷魔趣向見知一乘道人見維摩等住不思議解脫大士機辨活發無礙自在思知見性機辨妙而專代辨達行住座臥唯行機活久修之故終得習練而至得自在而惟我已得諸佛知見辨自在心不顧理理不知諸佛知見道者是誠是雅是靜是德但辨達機德是知見一端而未真實天鬼領氣障魔十一高智破戒報魔二持戒輕智報魔三修定著怪報魔四智戒四見報魔五依寶不法報魔六妙解無報報魔七智行慢心報魔八有智無質報魔九表學誑人報魔十長辨樂輪報魔外道邪見障魔二一歸氣斷滅見魔二成神無果見魔釋中邪解障魔四一文字博學見魔二肝文要約見魔三易行倦厭見魔四難行奇怪見魔知見差路障魔十一禪座不得迷魔二辨達不悟迷魔三凡聖不別見魔四慮難不發迷魔五慮易差別路魔六知見不修迷魔七能修不見迷魔八見空不中迷魔九見滅不實迷魔十心教不同迷魔往生品第七白佛言世尊四十餘年所説經中常説應念應稱佛名如藥師佛阿彌陀佛以心相念以相舌稱得何功德佛言天王有四種義一者親近大聖二者願樂聖道三者加受聖助四者因緣聖入以如是義説功德大白佛言世尊復説常念觀世音菩薩文殊師利菩薩普賢彌勒是亦云何佛言天王説念觀音此菩薩從耳根圓通起大智慧其智慧體即大慈悲其慈悲心即大行願是即一切諸佛道體一切衆生如是行道念文殊者得大智慧念普賢者入大行願念彌勒得者得大慈悲智悲行者佛道大綱過去諸佛現在諸佛未來諸佛東西南北上下諸佛及其大法無一入悲智行佛法無一如來非智行得成佛者無一衆生非非悲智行當成佛者若説智悲行外有一成佛之法是外道説非七佛説十方三世一切諸佛一切菩薩為智悲行難行苦行度自化他已成佛道當成佛道無有一佛及一菩薩不自修行智悲行道而依他佛他菩薩力得成佛道若説有不自修行功依他力得成佛道者是波旬説非説佛説白佛言世尊何故修諸善功德及觀佛稱名往生淨土其故云何佛言天王初心菩薩及下根士大恐於此娑婆國行六度萬行及修開悟佛知見道或有倦勞或有退轉以佛方便淨土成就根力而還此土欲令成滿萬善大行而説此義於如是類修行人中有二種機一者今生得利勝義二者後生得利劣機何為今生得利勝機初心中有利根敏慧開見經道即解彼佛阿彌陀及我釋迦佛建願示誨勸往生者是即諸佛善巧所以不得止説其真實為令諸衆生修行普賢大道是也不求往生即向普賢大道而行即成大根菩薩或有菩薩為往生故觀佛身時見己身了是心是佛悟是理時頓知此土時全是淨土不轉是身即是佛身應時知得成就根力不借往生真行方善或有菩薩為往生故修行念佛者不可得具十大心念如已前依彌勒菩薩問之所答是十念者一切菩薩修行本念為念佛故常修十念念念通徹於十念者即得成就菩薩大行不借往生直行萬善或有菩薩為往生故修行三心無暴無散無亂無垢無邪是得至誠心於其心相無偽無欺無焰無妄無疑無貪無瞋是施是戒是智是理是慧入悲是敬是讓是義是理是觀音心是即佛心得大深心於其心相無粗無動無散無亂無卒無暴無暗無迷是忍是定是慧是覺是見是辨是明是審是慎是慮是文殊心入即佛心得發願心於其心相無厭無倦無懈無休無退無轉無放無逸是進是方是願是力是勇是猛是活是發是格是致是普賢心是即佛心是三心者菩薩真行心心成就即得大道不借往生直行萬善或菩薩能知佛慮能聞佛説為往生故修往生行聞説唯稱佛名修有福者皆得胎生或宮殿中或蓮華中經五百歲十二劫不見佛身不聞正法若有開悟五大智者即得化生阿彌陀佛大菩薩衆圍繞住所寶座之上即見如來即聞正法即發信心速解五智所謂佛智者心佛衆生圓通根本普賢菩薩法界大智不思入智者菩薩所住不思議解脫菩薩大權方便自在大智不可言智者真空妙空文殊菩薩般若大智無等無偏最上勝智者諸佛知見觀音菩薩一乘大智往生修行菩薩欲得彼化生故修行五智阿彌陀佛以本願力加被開悟如是五智即證諸佛無上大道不借往生直行萬善如是四輩名為今生得利勝機何為後生得利劣機若有下根愚癡菩薩雖見如是諸佛方便不解不覺不志菩薩大修行道唯念著於彼佛國土快樂長壽愚人是也或有菩薩唯稱名號一向專念無量壽佛一心不亂唯入此道不見他人是非好惡不思他法勝劣高下不對住他行毀譽信難不向他教遠近向背唯恐自己罪咎邪惡唯懺自已散亂粗動唯責自己無道無法唯愧自己不正不和修一心故自然成善忘欲亦忘邪見及忘邪智無罪無逆自然作成孝養慈悲柔和質直安樂之心命終時至遠離諸執諸著即離生死往生極樂下品蓮華胎生之中無苦無惱安樂歡喜經多少劫時開蓮華即見彼佛無上相好即聞彼佛説一乘法漸開聖悟次得聖位或有菩薩強欲強惡常作殺生深著肉味偷盜他財大求富福衣服殿屋美色亂行憂悲短命強求長壽欲無頂絶不知世理暗心迷倒聖人下教賢人示化尚不云何如是愚人隨於其人其性其意聞説極樂世界妙事百寶莊嚴寶珠充滿百味飲食甘露湧勃遊行自在無不隨意菩薩衆生壽命無量無數沙劫神仙不及人相好妙美絶口天女歡樂無盡無晝夜春秋不來無寒無熱如仙宮年尚於彼宮絶出無對言語道斷心行所滅令諸愚人欲所欲達願樂往生漸漸增進佛境界樂改惡行善合於聖道遠離邪毒現世安樂命終如願即往極樂蓮華胎生時至開華見淨土相絶出人間仙宮天堂所願滿足修菩薩行終至菩提如是二輩名為後生得劣機人相有如是等二種得利大利益故諸佛如來往生他方佛土唯除以自愚癡無智不知道理暗昧之心而忘了解聖教義理以自為勝以他為劣以私智教他人欲作自愚伴以此劣行為勝於其最上勝行云何除之是謗正法背彼如來本願故云何背彼本願心也彼阿彌陀佛常説一乘常念一乘而唯欲令下方一切衆生等悟一乘妙道不以劣行為其本意入守常護娑婆世界修行大道不以極樂住安修行為其本意但發弘願令得往生一心愚人不堪於此修行成故爾不得止立往生願彼佛心念無隔娑婆安養之思娑婆安養一通平等此界他界更無有差彼佛心念無隔念念他之心何以故爾一佛衆佛衆佛一佛法身一體此佛他佛無有差故人間大君尚無我而念自念他心不作差何況於果滿地如來梵王果報尚清淨而天上天下目不見差何況於果滿地如來爾時阿難白佛言世尊於已前説光明遍照念佛衆生此事云何佛言阿難此光明照非有念我念他差別照之境界衆生能觀佛三昧三昧成見是心是佛解法身理通一乘道法身光明常照十方更無照彼照是差別自心合彼光明則自當於此光唯有彼佛因地本願取之不捨白佛言世尊菩薩成就觀佛十念三心五智其法何已成就一其菩薩永留此土定不可求往生淨土佛言阿難若菩薩在無佛世界戀慕如來欲得生他方淨土見佛聞法受法樂樂者謂於法中成就一者即得往生他方淨土及生都率於極樂者即得往生上品上生時見彼尊阿彌陀佛觀音勢至一切菩薩即遊他見一切佛即聞正法妙法華經華嚴般若一切大乘於都率者亦得往生四十九重摩尼寶殿親直見我牟尼佛阿彌陀佛阿閦寶生藥師佛等即見供養教主彌勒觀音菩薩普賢菩薩文殊地藏維摩詰及虗空藏等難見菩薩及見供養不動威德夜叉三世難見明王亦見供養辨才吉祥多聞王等菩薩大天亦復即見摩阿迦葉舍利弗等菩薩聲聞即聞大乘成佛法也白佛言世尊入養都率以何為難得安往生土佛言阿難都率天宮是有漏土一切凡夫修行十善念彼彌勒即得往生念藥師佛念觀世音普賢文殊一切亦然諸佛常在於此宮中一切凡夫常見諸佛此土即是三世諸佛補所土故極樂世界淨琉璃土有此宮中譬如維摩斷取東方歡喜國土入其室中阿閦如來在於室中彼斷取故會畢時則其土還本是宮即是補所土故三世常住不還本所依如是理凡夫往生都率為易安養世界無漏土故未盡比丘亦不得往何以故爾雖已盡漏是小結漏道行彼安樂土大乘土故以是為難但有往生一切凡夫依二生者云何二生是此依彼阿彌陀佛本願力故以方便功造作蓮華其品分九華中胎生上者一宿下者十二大劫經中隨其功德大小多入或其罪障輕重多少蓮華開有少遲速不同所謂二生其一生者現生命終從此土生於蓮華中此蓮華者雖有彼土蓮華中者亦非彼土經多少劫自然合於諸佛大道懺悔先罪罪已消滅自然開悟修行大道是為一生大道行時蓮華即開其時實生安樂世界阿彌陀佛諸大菩薩圍繞住所是實往生為是二生亦有九品外有一生此有四輩一者修行六度開悟發智菩薩道人即得直生彌陀佛前二者漏盡大阿羅漢忽回心發大乘道心亦修其道即得直生阿彌陀佛前三者雖未得盡諸漏亦雖未得六波羅密受持法華一佛乘典如説修行隨分達得於佛智見開示悟入即得直生彌陀佛前四者受持無上神呪毗盧遮那阿閦寶生不空成就阿彌陀佛三世諸佛一同總持神便呪術諸祕神呪諸佛祕呪所呪呪成是故能成非是諸佛私助私成是呪法成呪惡成善呪迷成覺呪罪成福呪凡成聖呪障成淨呪難成易於呪力者一切諸佛所不及力意念圓月中座五佛毗盧如來放黃色光阿閦青光寶生赤光阿彌陀白光不空紫光右手能作五色光印口誦神呪光明真言呪自呪他即成法身即得直生彌陀佛前是呪往生一切不擇善人惡人智人愚人佛力不及但呪力成唯有一障於過去世不結緣者不殖因者不遇此呪者雖有遇呪不發信心為失大利如是惡人五佛諸佛不云之何白佛言世尊若有惡人聞此呪力有如是功以呪力故還作惡行為云何之佛言阿難如汝所言依其理故諸佛祕之不妄授人唯有宿善得遇此呪雖然如是信心持呪依三密力自然忘惡自然去罪心身清淨作善人也白佛言世尊已前所説十念生為下品下生今為十念化生往生云何解之佛言阿難已前説者臨命終時依知識教具足十念日惡逆其時功少是故往生下品下生今所説者常修十念至十念道道人是也是故往生寶座之上白佛言世尊如阿彌陀本願言者除五逆生及謗法生亦如下品下生人者謗法五逆皆得往生云何如是有差別也佛言阿難如本願言是皆彼佛成往生法故除之耳若彼如來念我佛故曲今逆罪惡人往生是不當理若有爾者阿彌陀佛不成就願不成佛道應墮無理罪過之中非是大聖如彼下品下生人者依智識教至誠懺悔先惡先罪一切捨惡改心清淨即成正心具足十念成改新人當知是人正心無罪而善人徒是自往生非彼佛私亦復如來加被力者是人即是善人之徒云何彼佛不加被之不論凡聖於生一生謂善人生則為都率天宮是易為安養難亦論凡聖於生二生謂惡人生則為安養世界是易為都率難唯於依呪三密行與行一乘道佛知見者安養都率同共為易更無有難白佛言世尊於三密行呪與印下凡夫下愚能堪修之於心月者更所不堪應云何行佛言阿難真言行人有四種根上智行人三薄伽梵在楞伽山中為大慧菩薩等天仙大衆説極大乘法佛告阿難汝等人天實欲成佛當直修如來真實禪治身治口治意以其散亂者能入自覺聖智境界成就無上佛身阿難當知其禪那者以三種義成就其體一者工夫法相法理解除邪理證致正理二者攝取聖道正心解治放心證得道心三者會感三昧覺道解轉凡質證成聖果佛告阿難是如來禪有前方禪中得道禪後真實禪云何方便禪當觀毗盧遮那佛空理一道身是此毗盧遮那如來法性虗空體法界身遍一切界佛告阿難先欲觀如來虗空體當觀得自己一切心體無相絶離寂滅空莫而無一毛我我所有是一虗無佛法身觀之了令心為絶空真際體而得一切無動境是為定成能入畢者離一切煩惱永無歸生死是名前方便禪亦名大乘初門入道觀佛告阿難云何中得道禪菩薩欲觀如來法界身當觀自己一箇心相元來妙理圓滿微塵藏海而自成自覺聖智體常樂我淨德此有五菩薩德當修行是如來禪道云何五菩薩德今思過去無數大劫於阿彌拏之阿彌拏劫前之阿僧祇之阿僧祇劫前出世阿彌拏之阿彌拏諸佛阿僧祇之阿僧祇諸佛於其諸佛有一毗盧遮那佛此毗盧遮那佛一躬分定慧身成二菩薩第一智慧身菩薩其名曰應聲菩薩是毗盧遮那佛右身分也第二禪定身菩薩其名曰普賢菩薩是毗盧遮那佛左身分也應聲菩薩依智慧本體分理智悲三體成三菩薩元身理法是應聲菩薩也右手智慧是空藏菩薩也左手慈悲是地藏菩薩也普賢菩薩依禪定本體分智行二體成二菩薩元身行願是普賢菩薩別身知見是文殊菩薩也應聲菩薩住行願西方主東方慈悲普賢菩薩住慈悲東方主西方願空藏菩薩住智慧行南方主北方儀業文殊菩薩住儀業北方主南方智慧地藏菩薩住誠信中央主四方德用故是一菩薩娑婆有緣菩薩此五菩薩法身自體周遍法界故等流而成人天衆生五理性心云何五理性心一釋迦理性心菩薩當觀自己元心有一箇大慈大悲心是諸佛心是諸天心世間有善人是天地順生人世能饒益世間為是人生慈悲是自然理性具心也束諸心成愛和心束諸業成撫育業是心是業純善心純善業也世間有惡人是天地逆生人也會災厄苦害為是人生悲心是自然理性具心也束諸心成惻憐心束諸業成救濟業是心是業純善心純善業也向父母成孝向子僕成慧是心最上善心也此心為天之性而覆蓋育養萬物能練熟此心成常恆不變之位是為定成二阿施理性心菩薩當觀自己心理有一箇義理堅固心為是菩薩行是天衆道一切世間皆依義正乎而立依道理而利是心是道心是理是道理善人依之得利非於義理心有利心道理自有利惡人為焉被尅非於義理心有尅心道理自為尅是心向君主成忠向衆倫成宜此心為天之體而堅同保持能練熟此心成常恆不變之位是為定成三尸迦理性心菩薩當觀自己心理有一箇敬儀節格心是上天法是衆聖法其體常不變其用應於時大梵王天定是法於天金輪聖王定是法於地諸佛定是法於法界菩薩定是法於人常是心是正心是法是正法是心能成世間方法及天地之尊卑上下位能緣熟此心成常恆不變之位是為定成四般若理性心菩薩當觀自己心理有一箇智慧照明心是諸佛光是諸天明世間有山原溪谷河海橋船無光明則何行往云人間有物事是非萬法迷悟無智考則何執行云多大少小皆智慧之任也能練熟此心成常恆不變之位是為定成五曇末理性心菩薩當觀自己心理有一箇誠信道源心是薩埵德道人依世間出世失此誠信則一切萬法無得其據上四心皆得此地而為位能練熟此心成常恆不變之位是為定成佛告阿難所謂釋迦理性心以大慧大宥為事又有阿施理性心制之而不救令釋迦理性心恣慧恣宥阿施理性心以尤成敗為事又有般若理性心制之而不赦令阿施理性心恣成恣敗般若理性心以廣計遠識為事又有尸迦理性心制之而不赦令般若理性心恣計識尸迦理性心以專讓專節為事又有曇未理性心制之而不赦令尸迦理性心恣讓恣節曇未理性心以偏實唯同為事又有釋迦理性心制之而不赦令曇未理性心姿實姿同如是有互互制詰之理而不赦毛端之妄佛告阿難五理性心得其互制居其本位合本理而不亂譬如轉輪聖王城堀石石相疊而互制之互詰之以不散亂墜落而城形堅固德五理性心如是互制互詰不令過分不令不足於是釋迦居善阿施居宜般若居理尸迦居真曇末居道而各位矣世間悉依之大保建立佛告阿難是此五理性心者唯一心也共有共無唯其有以為其成又其無以得其善耳如環無端能觀其元體而成堅固又其應用而成正明以使物事無量皆致善也而已如是五理性心成就者下品在人間修賢聖道利自利他令世界安樂導衆生於菩薩道中品入神仙修菩薩道化龍鬼妖魅導佛道保護世界上品生天宮修菩薩道保天鎮地利益衆生萬物最上品不定或交地獄餓鬼畜生或住人間神仙天宮或住他方諸佛淨土分身無量現形無數而行佛道自利他益佛告阿難如是善心尚有制詰成真善也況於惡心一切惡心皆為五理性心被制詰不能生發佛告阿難生發惡心惡事有二源一名善過源二名虗無源云何善過源五理性心偏過於一以不五者並在亦復一一長過不五者制詰則其佛性之理性為無明妄氣遂被漂侵為妄過速成惡心其慈悲者成愛著心其義理者成憎害心其智慧者成侫姦心其敬儀成諂媚心其誠信者成偏頗心大損聖道譬如療病人服藥治病而過服以還病藥毒云何虗無源以五理性心不至常成而忽放之則於其間隙即生貪吝瞋恨愚惑妄想等邪意若生此心則此心速成就惡作身成殺害偷盜淫亂謾儀等邪業口成惡口兩舌妄語綺語等邪言生而破人損身耻名亡子孫滅倒家門死而落地獄餓鬼傍生修羅終無離生死輪回憂悲苦惱汝等世如出世六通聲聞緣覺及世間五通天神仙鬼等若見掌中安羅果始終森羅故不可委説如是悉觀世間微塵得一切無惑一切成德位是為成定是名中得道禪亦名大乘中中常修道觀佛告阿難云何後真實禪菩薩欲觀如來全體成佛身者即以應聲菩薩釋迦心修智禪離壽者相得樂德盡心意識有為至無量壽佛果證妙觀察智住無緣慈悲以普賢菩薩阿施心修聖禪離衆生相得常德盡阿羅耶有為至阿閦祕佛果證大圓鏡智住無作行願以空藏菩薩般若心修自禪離我相得我德盡我我所有為至華開敷佛果證平等性智住無得福德以吉祥菩薩尸迦心修覺禪離相人得淨德盡五根大識有為至天鼓音佛果證成所作智住無相知見以地藏菩薩曇未心修如來禪離法非見得波羅德盡無明惑有為至大牟尼佛果證法界體智住無漏覺果三世諸佛皆依此道轉因成果取正覺名如來應供正遍智妙行足善逝世間解無上士調御丈夫天人師佛世尊是名後真實禪亦名大乘終室得道觀佛告阿難是修成佛禪者下品行者初發心時便成正覺住凡夫地即悟成佛中品行者得成三時入普賢道上品行者是名一生補所最上品行者即是三世諸佛佛告阿難修是如來禪者於前中後位雖未得實行實證世間者治人間道下品道者得善人位中品道者得賢人位上品道者得聖人位現在明德後生天宮出世者治沙門道下品道者得善人位中品道者得覺悟位上品道者得三昧位現在妙異後生淨土佛説此經已一切菩薩聲聞天仙鬼一切人民大歡喜
